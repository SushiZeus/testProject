<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Petty Cash Data</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 1rem;
        }
        p {
            color: #666;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        button {
            background: #ef4444;
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        button:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }
        .success {
            color: #10b981;
            font-weight: 600;
            margin-top: 1rem;
            display: none;
        }
        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗑️ Reset Petty Cash Data</h1>
        <p>This will permanently delete all petty cash requests from the system and start fresh with an empty database.</p>
        <p><strong>Warning:</strong> This action cannot be undone!</p>
        <button onclick="resetData()">Reset All Petty Cash Requests</button>
        <div class="success" id="success">
            ✅ Data cleared successfully! Redirecting to dashboard...
        </div>
        <a href="/" class="back-link">← Back to Dashboard</a>
    </div>

    <script>
        function resetData() {
            if (confirm('Are you absolutely sure? All petty cash requests will be permanently deleted.')) {
                try {
                    // Clear petty cash store
                    localStorage.removeItem('pettyCashStore');
                    
                    // Show success message
                    document.getElementById('success').style.display = 'block';
                    
                    // Redirect after 2 seconds
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } catch (error) {
                    alert('Error clearing data: ' + error.message);
                }
            }
        }
    </script>
</body>
</html>
